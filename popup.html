<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EcoLens</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
    * { box-sizing:border-box; margin:0; padding:0; }
    body { width:260px; background:#0a0e0b; color:#e8f0e9; font-family:'DM Mono','Courier New',monospace; overflow:hidden; }

    .hd { padding:13px 15px 11px; border-bottom:1px solid #1e2e1f; display:flex; align-items:center; justify-content:space-between; }
    .logo { display:flex; align-items:center; gap:7px; }
    .logo-dot { width:8px; height:8px; border-radius:50%; background:#5dbf72; animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }
    .logo-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; color:#f0f7f0; letter-spacing:-0.03em; }
    .logo-name span { color:#5dbf72; }
    .ver { font-size:9px; color:#2a4a2c; letter-spacing:.06em; }

    .grid-strip { padding:8px 15px; background:#050a06; border-bottom:1px solid #1e2e1f; display:flex; align-items:center; gap:8px; font-size:10px; color:#3a5a3c; }
    .grid-dot { width:6px; height:6px; border-radius:50%; }
    .grid-val { color:#7a9b7c; }
    .grid-source { margin-left:auto; font-size:9px; color:#2a4a2c; }

    .session { padding:14px 15px 12px; border-bottom:1px solid #1e2e1f; }
    .sess-label { font-size:9px; color:#3a5a3c; letter-spacing:.1em; text-transform:uppercase; margin-bottom:5px; }
    .sess-num { font-family:'Syne',sans-serif; font-size:36px; font-weight:800; color:#5dbf72; line-height:1; letter-spacing:-0.04em; transition:color 0.4s; }
    .sess-num.amber { color:#EF9F27; }
    .sess-num.red   { color:#E24B4A; }
    .sess-sub { font-size:10px; color:#3a5a3c; margin-top:4px; }
    .equiv-box { margin-top:9px; padding:8px 10px; background:#0d130e; border:1px solid #1e2e1f; border-radius:8px; font-size:10px; color:#7a9b7c; line-height:1.5; }
    .equiv-box strong { display:block; font-size:9px; color:#5dbf72; letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; font-weight:500; }

    .breakdown { padding:11px 15px; border-bottom:1px solid #1e2e1f; }
    .bd-label { font-size:9px; color:#3a5a3c; letter-spacing:.1em; text-transform:uppercase; margin-bottom:9px; }
    .site-row { display:flex; align-items:center; gap:7px; margin-bottom:8px; }
    .site-row:last-child { margin-bottom:0; }
    .site-icon { width:20px; height:20px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:500; flex-shrink:0; }
    .site-name { font-size:11px; color:#7a9b7c; flex:1; }
    .site-count { font-size:10px; color:#2a4a2c; }
    .site-g { font-size:11px; font-weight:500; color:#c8e0ca; min-width:36px; text-align:right; }
    .bar-track { height:2px; background:#111a12; border-radius:100px; overflow:hidden; margin-top:2px; }
    .bar-fill { height:100%; border-radius:100px; width:0%; transition:width 1s cubic-bezier(.25,1,.5,1); }

    .model-row { padding:10px 15px; border-bottom:1px solid #1e2e1f; display:flex; align-items:center; gap:8px; font-size:10px; color:#3a5a3c; }
    .model-badge { font-size:9px; padding:2px 8px; border-radius:100px; font-weight:500; }
    .mb-measured { background:#0d1f0e; color:#5dbf72; border:1px solid #2a4a2c; }
    .mb-estimated { background:#1a150a; color:#EF9F27; border:1px solid #4a3510; }

    .device-row { padding:10px 15px; border-bottom:1px solid #1e2e1f; }
    .dev-label { font-size:9px; color:#3a5a3c; letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px; }
    .dev-btns { display:flex; gap:5px; }
    .dev-btn { flex:1; padding:5px 0; border:1px solid #1e2e1f; border-radius:6px; background:transparent; color:#4a6b4c; font-family:'DM Mono',monospace; font-size:9px; cursor:pointer; text-align:center; transition:all .15s; }
    .dev-btn.sel { border-color:#2a4a2c; background:#0d1f0e; color:#5dbf72; }
    .dev-btn:hover { border-color:#2a4a2c; color:#7a9b7c; }

    .footer { padding:9px 15px; display:flex; align-items:center; justify-content:space-between; }
    .reset-btn { font-family:'DM Mono',monospace; font-size:9px; color:#2a4a2c; background:none; border:none; cursor:pointer; letter-spacing:.06em; text-transform:uppercase; padding:0; transition:color .15s; }
    .reset-btn:hover { color:#E24B4A; }
    .src-link { font-size:9px; color:#2a4a2c; text-decoration:none; transition:color .15s; }
    .src-link:hover { color:#5dbf72; }

    .empty { padding:20px 15px; text-align:center; }
    .empty-icon { font-size:26px; margin-bottom:8px; color:#1e2e1f; }
    .empty-msg { font-size:11px; color:#3a5a3c; line-height:1.7; }
    .empty-msg span { color:#5dbf72; }
  </style>
</head>
<body>
  <div class="hd">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-name">Eco<span>Lens</span></div>
    </div>
    <div class="ver">v2.0 · Phase 1</div>
  </div>

  <div class="grid-strip" id="grid-strip">
    <div class="grid-dot" id="grid-dot" style="background:#3a5a3c"></div>
    <span>Grid:</span>
    <span class="grid-val" id="grid-val">detecting…</span>
    <span class="grid-source" id="grid-source"></span>
  </div>

  <div id="main-content"></div>

  <div class="device-row">
    <div class="dev-label">Your device</div>
    <div class="dev-btns">
      <button class="dev-btn" data-device="phone"   onclick="setDevice(this)">Phone</button>
      <button class="dev-btn sel" data-device="laptop" onclick="setDevice(this)">Laptop</button>
      <button class="dev-btn" data-device="desktop" onclick="setDevice(this)">Desktop</button>
      <button class="dev-btn" data-device="tv"      onclick="setDevice(this)">TV</button>
    </div>
  </div>

  <div class="footer">
    <button class="reset-btn" id="reset-btn">↺ reset</button>
    <a class="src-link" href="https://theshiftproject.org" target="_blank">sources: Shift Project · IEA</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
